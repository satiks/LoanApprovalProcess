spring:
  application:
    name: loanapp
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/loanapp}
    username: ${DB_USERNAME:loanuser}
    password: ${DB_PASSWORD:loanpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

server:
  port: 8080

loan:
  max-customer-age: 70
  base-interest-rate: 3.5000
